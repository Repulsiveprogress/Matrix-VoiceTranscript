[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = [
    "E", "W", "F", "I", "UP", "B", "C4", "SIM", "S", "T20", "RUF",
]
ignore = [
    "S101",
    "S104",
    "S311",
]

[tool.ruff.lint.per-file-ignores]
"src/__init__.py" = ["F401"]
"src/strings.py" = ["RUF001"]

[tool.ruff.lint.isort]
known-first-party = ["src"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.bandit]
targets = ["src"]
severity = "medium"
confidence = "medium"
skips = ["B101", "B311", "B404", "B603"]
